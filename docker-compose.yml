services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: kos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-kos_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${DB_NAME:-kos_management}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Port 5432 TIDAK di-expose ke host — db hanya diakses internal oleh backend.
    # (Hindari bentrok dengan postgres lain & lebih aman.)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kos_admin} -d ${DB_NAME:-kos_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend API (Node.js + Express + Prisma)
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kos-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-kos_admin}:${DB_PASSWORD:-changeme_in_production}@db:5432/${DB_NAME:-kos_management}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY:-}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY:-}
      MIDTRANS_IS_PRODUCTION: ${MIDTRANS_IS_PRODUCTION:-false}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      HERMES_API_URL: http://hermes:8642
      HERMES_WA_BRIDGE_URL: http://hermes:8642
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      BASE_URL: https://kos.j99t.tech
    # Port backend TIDAK di-expose ke host — diakses internal oleh nginx & mcp.
    # Untuk debug dari host, expose sementara mis. - "4100:4000".
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  # ============================================
  # Frontend (React + Vite) — served by Nginx
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kos-frontend
    restart: unless-stopped
    # Port 3000 TIDAK di-expose ke host — frontend hanya diakses lewat nginx
    # (http://frontend:80 di internal network). Ini menghindari bentrok dengan
    # container lain yang sudah pakai 0.0.0.0:3000 (mis. kiva-app).
    depends_on:
      - backend

  # ============================================
  # Nginx Reverse Proxy
  # kos.j99t.tech → frontend (/)
  # kos.j99t.tech/api → backend (/api)
  # kos.j99t.tech/bot → hermes dashboard
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: kos-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/bot:/usr/share/nginx/html/bot:ro
    depends_on:
      - frontend
      - backend
      - hermes

  # ============================================
  # Cloudflare Tunnel
  # Connects kos.j99t.tech → nginx:80
  # ============================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kos-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - nginx

  # ============================================
  # Kos MCP Server (sidecar)
  # Exposes backend API as MCP tools for Hermes
  # ============================================
  kos-mcp-server:
    build:
      context: ./hermes/mcp-server
      dockerfile: Dockerfile
    container_name: kos-mcp-server
    restart: unless-stopped
    environment:
      BACKEND_API_URL: http://backend:4000/api
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      MCP_PORT: "3100"
    # Port 3100 TIDAK di-expose ke host — hanya dipanggil Hermes internal
    # (http://kos-mcp-server:3100/mcp). Untuk cek health dari host, expose
    # sementara - "3100:3100".
    depends_on:
      - backend

  # ============================================
  # Hermes Agent (NousResearch)
  # Official Docker image — WhatsApp gateway mode
  # Dashboard on port 9119, API on port 8642
  #
  # First run: docker compose run --rm hermes setup
  # Then:      docker compose up -d
  # ============================================
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: kos-hermes
    restart: unless-stopped
    command: gateway run
    shm_size: "1g"
    environment:
      # LLM Provider (custom OpenAI-compatible, dibaca dari config.yaml)
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      # Dashboard — bind 0.0.0.0 supaya port 9119 bisa diakses dari host/nginx.
      # Bind non-loopback otomatis mengaktifkan auth gate Hermes, jadi WAJIB
      # set provider basic-auth di bawah — kalau tidak, Hermes menolak start.
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "9119"
      # Basic-auth provider (username/password) untuk login dashboard.
      HERMES_DASHBOARD_BASIC_AUTH_USERNAME: ${DASHBOARD_USER:-admin}
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: ${DASHBOARD_PASSWORD:-changeme_dashboard}
      # Secret tetap supaya sesi login tidak hilang tiap container restart.
      HERMES_DASHBOARD_BASIC_AUTH_SECRET: ${DASHBOARD_SECRET:-}
      # API Server (optional, for external integrations)
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: ${HERMES_API_KEY:-changeme}
    ports:
      - "3001:9119"   # Dashboard
      - "8642:8642"   # API server
    depends_on:
      - kos-mcp-server
    volumes:
      - hermes_data:/opt/data
      - ./hermes/config.yaml:/opt/config.yaml:ro
      - ./hermes/SOUL.md:/opt/data/SOUL.md:ro

volumes:
  pgdata:
  uploads:
  hermes_data: